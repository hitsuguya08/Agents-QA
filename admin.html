<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QA Admin | Dashboard Editor</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root { --primary: #f59e0b; --dark: #0f172a; --bg: #fef3c7; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h1 { color: var(--dark); border-bottom: 3px solid var(--primary); display: inline-block; }
    .login-box { text-align: center; padding: 50px 0; }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-family: inherit; }
    button { background: var(--dark); color: var(--primary); padding: 12px 25px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    button:hover { transform: scale(1.05); }
    .agent-card { background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
    .output-area { background: #0f172a; color: #10b981; padding: 20px; border-radius: 10px; font-family: monospace; display: none; margin-top: 20px; max-height: 300px; overflow: auto; }
  </style>
</head>
<body>

<div class="container" id="mainApp">
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-box">
        <h2>Admin Access</h2>
        <input type="password" id="adminPw" placeholder="Enter Admin Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- EDITOR SECTION -->
    <div id="editorSection" style="display:none;">
        <h1>Agent Data Editor</h1>
        <p>Edit the fields below, then click "Generate JSON".</p>
        <div id="agentList"></div>
        <hr>
        <button onclick="generateJSON()" style="background: #10b981; color: white; width: 100%;">GENERATE NEW DATA.JSON</button>
        
        <div id="outputContainer">
            <h3>Copy this code to your data.json:</h3>
            <textarea id="jsonOutput" class="output-area" readonly onclick="this.select()"></textarea>
            <p id="copyHint" style="display:none; color: #059669; font-weight: bold;">✅ Code copied! Now paste it to your GitHub file.</p>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASS = "admin123"; // PWEDE NIMO KINI USBON
    let currentData = [];

    function login() {
        if(document.getElementById('adminPw').value === ADMIN_PASS) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('editorSection').style.display = 'block';
            loadData();
        } else { alert("Wrong admin password!"); }
    }

    function loadData() {
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                currentData = data;
                renderEditor();
            })
            .catch(e => alert("Error loading data.json. Make sure it exists."));
    }

    function renderEditor() {
        const list = document.getElementById('agentList');
        list.innerHTML = "";
        currentData.forEach((agent, index) => {
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.innerHTML = `
                <h3>${agent.name}</h3>
                <label>Score (%)</label>
                <input type="number" value="${agent.score}" onchange="updateAgent(${index}, 'score', this.value)">
                <label>Password</label>
                <input type="text" value="${agent.password}" onchange="updateAgent(${index}, 'password', this.value)">
                <label>Long Calls (One per line)</label>
                <textarea rows="4" onchange="updateArray(${index}, 'qa', this.value)">${agent.qa.join('\n')}</textarea>
                <label>Audits (One per line)</label>
                <textarea rows="4" onchange="updateArray(${index}, 'audits', this.value)">${agent.audits.join('\n')}</textarea>
            `;
            list.appendChild(card);
        });
    }

    function updateAgent(index, field, value) {
        currentData[index][field] = value;
    }

    function updateArray(index, field, value) {
        currentData[index][field] = value.split('\n').filter(line => line.trim() !== "");
    }

    function generateJSON() {
        const output = document.getElementById('jsonOutput');
        output.value = JSON.stringify(currentData, null, 2);
        output.style.display = 'block';
        document.getElementById('copyHint').style.display = 'block';
        
        // Auto copy to clipboard
        output.select();
        document.execCommand('copy');
    }
</script>

</body>
</html>
