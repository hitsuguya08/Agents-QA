<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Admin | Elite Editor MTD</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root { --primary: #f59e0b; --navy: #0f172a; --slate: #1e293b; --bg: #fef3c7; }
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 280px; background: var(--navy); color: white; display: flex; flex-direction: column; border-right: 2px solid var(--primary); }
    .sidebar-header { padding: 25px; border-bottom: 1px solid var(--slate); text-align: center; }
    .agent-list { flex: 1; overflow-y: auto; padding: 10px; }
    .agent-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
    .agent-item:hover { background: var(--slate); color: white; }
    .agent-item.active { background: var(--primary); color: var(--navy); font-weight: 800; }
    .btn-del-agent { background: #ef4444; color: white; border: none; border-radius: 6px; width: 24px; height: 24px; font-size: 0.7rem; font-weight: bold; cursor: pointer; opacity: 0; }
    .agent-item:hover .btn-del-agent { opacity: 1; }
    .editor-main { flex: 1; display: flex; flex-direction: column; background: white; }
    .editor-header { padding: 20px 40px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .scroll-content { padding: 40px; overflow-y: auto; flex: 1; }
    .theme-box { background: #1e293b; padding: 25px; border-radius: 24px; margin-bottom: 30px; border: 2px solid var(--primary); color: white; }
    .preset-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
    .preset-btn { border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.65rem; font-weight: 800; transition: 0.2s; text-align: center; }
    .preset-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
    .color-input { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; background: #020617; padding: 4px; }
    .tabs-container { display: flex; gap: 10px; margin-bottom: 25px; background: #f1f5f9; padding: 10px; border-radius: 15px; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; color: #64748b; background: transparent; }
    .tab-btn.active { background: var(--navy); color: var(--primary); }
    .btn-save { background: var(--navy); color: var(--primary); border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }
    .btn-add { background: var(--primary); color: var(--navy); border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .form-section { background: #f8fafc; padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
    .metric-inputs-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 15px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
    label { display: block; font-weight: 700; font-size: 0.7rem; margin-bottom: 8px; color: #94a3b8; text-transform: uppercase; }
    input, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; }
    .json-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; padding: 50px; justify-content: center; align-items: center; }
    .json-content { background: var(--navy); width: 100%; max-width: 700px; border-radius: 25px; padding: 35px; border: 1px solid var(--primary); }
    textarea.json-area { background: #020617; color: #10b981; border: none; height: 300px; font-family: monospace; width: 100%; padding: 20px; border-radius: 12px; outline: none; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header"><h2 style="color:var(--primary); font-size:0.9rem;">QA ADMIN PANEL</h2></div>
    <div id="agentList" class="agent-list"></div>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button onclick="addNewAgent()" class="btn-add">+ New Agent</button>
        <button onclick="showExport()" class="btn-save" style="background:var(--primary); color:var(--navy);">🚀 GENERATE JSON</button>
    </div>
  </div>

  <div class="editor-main">
    <div class="editor-header">
      <h2 id="editingTitle" style="color:var(--navy);">Theme & Data Editor</h2>
      <div style="display:flex; gap:10px; align-items:center;">
          <button onclick="clearWeeklyData()" style="background:#fee2e2; color:#ef4444; border:1px solid #fecaca; padding:8px 15px; border-radius:10px; font-weight:800; cursor:pointer; font-size:0.75rem;">🧹 Reset Week</button>
          <a href="index.html" style="text-decoration:none; color:var(--navy); font-weight:800; font-size:0.8rem; border:2px solid var(--navy); padding:8px 15px; border-radius:10px;">View Dashboard</a>
      </div>
    </div>
    
    <div class="scroll-content">
        <div class="theme-box">
            <h3 style="margin:0; font-size:0.85rem; color:var(--primary); letter-spacing:1px;">🎨 SELECT AUTOMATIC COLOR SCHEME</h3>
            <div class="preset-container">
                <button class="preset-btn" onclick="setTheme('#f59e0b', '#fef3c7', '#0f172a')" style="background:#f59e0b; color:#0f172a;">AMBER GOLD</button>
                <button class="preset-btn" onclick="setTheme('#10b981', '#ecfdf5', '#064e3b')" style="background:#10b981; color:white;">EMERALD</button>
                <button class="preset-btn" onclick="setTheme('#3b82f6', '#eff6ff', '#1e3a8a')" style="background:#3b82f6; color:white;">OCEAN BLUE</button>
                <button class="preset-btn" onclick="setTheme('#8b5cf6', '#f5f3ff', '#2e1065')" style="background:#8b5cf6; color:white;">ROYAL VIBE</button>
                <button class="preset-btn" onclick="setTheme('#ec4899', '#fdf2f8', '#500724')" style="background:#ec4899; color:white;">ROSE PETAL</button>
                <button class="preset-btn" onclick="setTheme('#06b6d4', '#ecfeff', '#083344')" style="background:#06b6d4; color:white;">CYAN FROST</button>
                <button class="preset-btn" onclick="setTheme('#f97316', '#fff7ed', '#431407')" style="background:#f97316; color:white;">SUNSET</button>
                <button class="preset-btn" onclick="setTheme('#ffffff', '#111827', '#1f2937')" style="background:#374151; color:white;">DARK MODE</button>
            </div>
            <div class="theme-grid">
                <div><label>Primary</label><input type="color" id="themePrimary" class="color-input" onchange="saveAndSync()"></div>
                <div><label>Background</label><input type="color" id="themeBg" class="color-input" onchange="saveAndSync()"></div>
                <div><label>Card Color</label><input type="color" id="themeCard" class="color-input" onchange="saveAndSync()"></div>
            </div>
        </div>

        <div id="editorContent" style="display:none;">
            <div class="form-section">
                <!-- STATIC TOP PANELS COMPLIANT SA IMONG SCREENSHOT -->
                <h3>Agent Info & Previous Month Scorecard (Whole Month)</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div><label>Agent Name</label><input type="text" id="editName" oninput="saveAndSync()"></div>
                    <div><label>Password / Access Code</label><input type="text" id="editPass" oninput="saveAndSync()"></div>
                </div>
                <div style="margin-top:15px;"><label>Current Month (For QA Block Display)</label><input type="text" id="editMonth" oninput="saveAndSync()" placeholder="JUNE"></div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" id="btn-week1" onclick="switchTab('week1')">WEEK 1 FEEDBACK</button>
                <button class="tab-btn" id="btn-week2" onclick="switchTab('week2')">WEEK 2 FEEDBACK</button>
                <button class="tab-btn" id="btn-week3" onclick="switchTab('week3')">WEEK 3 FEEDBACK</button>
                <button class="tab-btn" id="btn-week4" onclick="switchTab('week4')">WEEK 4 FEEDBACK</button>
            </div>

            <div class="form-section">
                <h3 id="currentWeekTitle">WEEK DATA</h3>
                
                <div class="metric-inputs-grid">
                    <div>
                        <label>Previous Month Name</label>
                        <input type="text" id="weeklyMonthInput" oninput="updateWeeklyMetric('month', this.value.toUpperCase())" placeholder="MAY">
                    </div>
                    <div>
                        <label>F_SCR Score (%)</label>
                        <input type="number" step="0.01" id="fScrInput" oninput="updateWeeklyMetric('f_scr', this.value)" placeholder="90.98">
                    </div>
                    <div>
                        <label>Phone Time (%)</label>
                        <input type="number" step="0.01" id="phoneTimeInput" oninput="updateWeeklyMetric('phone_time', this.value)" placeholder="100.00">
                    </div>
                    <div>
                        <label>QA Score (%)</label>
                        <input type="number" step="0.01" id="qaScoreInput" oninput="updateWeeklyMetric('qa_score', this.value)" placeholder="87.46">
                    </div>
                    <div>
                        <label>Standard Score (%)</label>
                        <input type="number" step="0.01" id="standardScoreInput" oninput="updateWeeklyMetric('score', this.value)" placeholder="90.32">
                    </div>
                </div>
                
                <h3 style="margin-top:30px; font-size:0.8rem;">WEEK DATA (QA Feedback)</h3>
                <div id="qaContainer"></div>
                <button class="btn-add" onclick="addRow('qa')">+ Add Feedback Entry</button>

                <h3 style="margin-top:30px; font-size:0.8rem;">Dispo Audits</h3>
                <div id="auditContainer"></div>
                <button class="btn-add" onclick="addRow('audits')">+ Add Audit Entry</button>
            </div>
        </div>
    </div>
  </div>

  <div id="exportModal" class="json-modal"><div class="json-content">
      <h2 style="color:var(--primary); margin:0;">✅ JSON Ready</h2>
      <textarea id="jsonOutput" class="json-area" readonly onclick="this.select()"></textarea>
      <div style="display:flex; gap:10px; margin-top:25px;"><button class="btn-save" style="flex:1;" onclick="copyJSON()">Copy Code</button><button class="btn-save" style="background:#334155; color:white;" onclick="closeModal()">Close</button></div>
  </div></div>
    <script>
    let db = { theme: {}, agents: [] };
    let activeAgent = null; let currentViewWeek = 'week1'; let isUnlocked = false;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json?v=' + new Date().getTime()).then(r => r.json()).then(data => { 
          db = data.agents ? data : { theme: { primary: "#f59e0b" }, agents: data };
          if(db.theme?.primary) {
              const root = document.documentElement;
              root.style.setProperty('--primary', db.theme.primary);
              root.style.setProperty('--bg', db.theme.bg || "#fef3c7");
              root.style.setProperty('--card', db.theme.card || "#0f172a");
          }
          renderPills(db.agents); 
        });
    });

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        pill.innerHTML = `<div class="dot" style="background:var(--primary); width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px;"></div> ${agent.name}`;
        pill.onclick = () => { selectAgent(agent, pill); };
        box.appendChild(pill); if(i === 0) pill.click();
      });
    }

    function selectAgent(agent, element) {
      activeAgent = agent; isUnlocked = false; currentViewWeek = 'week1';
      document.querySelectorAll('.agent-pill').forEach(el => el.classList.remove('active'));
      element.classList.add('active'); renderDashboard();
    }

    function switchDashboardWeek(week) { currentViewWeek = week; renderDashboard(); }

    function renderDashboard() {
      const a = activeAgent; 
      if(!a.weekly_data) {
          a.weekly_data = { 
            week1:{month:"MAY",score:0,f_scr:0,phone_time:0,qa_score:0,qa:[],audits:[]}, 
            week2:{month:"MAY",score:0,f_scr:0,phone_time:0,qa_score:0,qa:[],audits:[]}, 
            week3:{month:"MAY",score:0,f_scr:0,phone_time:0,qa_score:0,qa:[],audits:[]}, 
            week4:{month:"MAY",score:0,f_scr:0,phone_time:0,qa_score:0,qa:[],audits:[]} 
          };
      }
      const weekly = a.weekly_data[currentViewWeek] || { qa: [], audits: [] };
      const qas = weekly.qa || []; const audits = weekly.audits || [];
      const currentQAControlMonth = a.month || "JUNE"; 

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">MONTH</div><div class="kpi-value">${currentQAControlMonth}</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">QA EVALS</div><div class="kpi-value">${qas.length}</div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">AUDITS</div><div class="kpi-value">${audits.length}</div></div>
        </div>
        <div class="dashboard-tabs">
            <button class="dash-tab-btn ${currentViewWeek === 'week1' ? 'active' : ''}" onclick="switchDashboardWeek('week1')">WEEK 1</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week2' ? 'active' : ''}" onclick="switchDashboardWeek('week2')">WEEK 2</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week3' ? 'active' : ''}" onclick="switchDashboardWeek('week3')">WEEK 3</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week4' ? 'active' : ''}" onclick="switchDashboardWeek('week4')">WEEK 4</button>
        </div>
        <div class="main-card">
            <div class="card-head">
                <h2 style="margin:0; color:var(--primary)">${a.name}</h2>
                <div class="btn-group">
                    <button style="background:transparent; color:var(--primary); border:1px solid var(--primary); padding:8px 15px; border-radius:10px; cursor:pointer; font-size:0.7rem; font-weight:800;" onclick="window.location.href='mailto:hitsuguya08@gmail.com'">✉️ CLARIFY FEEDBACK</button>
                    ${!isUnlocked ? '<button class="btn-verify" style="width:auto; padding:10px 20px; font-size:0.75rem;" onclick="openAgentModal()">🔐 UNLOCK MTD SCORES</button>' : ''}
                </div>
            </div>
            ${isUnlocked ? renderScoreSection() : ''}
            ${renderTable('QA Feedback (' + currentViewWeek.toUpperCase() + ')', qas, true)}
            ${renderTable('Dispo Audits', audits, false)}
        </div>`;
      if(isUnlocked) { setTimeout(updateProgressBar, 100); }
    }

    function renderScoreSection() {
      // PERMANENTENG GI-LOCK DIRETSO SA WEEK 1 KUNG ASA NIMO GISULAT ANG MATRIX SCORES
      const wdStatic = activeAgent.weekly_data['week1'] || {}; 
      const fScr = wdStatic.f_scr !== undefined ? wdStatic.f_scr : 0; 
      const phoneTime = wdStatic.phone_time !== undefined ? wdStatic.phone_time : 0;
      const qaScore = wdStatic.qa_score !== undefined ? wdStatic.qa_score : 0;
      const standardScore = wdStatic.score !== undefined ? wdStatic.score : 0; 
      const previousScorecardMonth = wdStatic.month || "MAY"; 

      const wd = activeAgent.weekly_data;
      const s1 = wd.week1.score || 0; const s2 = wd.week2.score || 0;
      const s3 = wd.week3.score || 0; const s4 = wd.week4.score || 0;
      
      const activeScores = [s1, s2, s3, s4].map(Number).filter(v => v > 0);
      const mtdAverage = activeScores.length > 0 ? (activeScores.reduce((a,b) => a+b, 0) / activeScores.length).toFixed(2) : "0.00";

      let badgeStyle = "status-badge-red";
      if (standardScore >= 75) badgeStyle = "status-badge-yellow";
      if (standardScore >= 90) badgeStyle = "status-badge-green";

      return `
        <div class="progress-section">
            <div class="progress-label-row"><span>PREVIOUS MONTH PERFORMANCE OVERVIEW</span><span id="mtdValue" style="color:var(--primary)">${standardScore}%</span></div>
            <div class="progress-bar-bg"><div id="mtdBar" class="progress-bar-fill"></div></div>
        </div>
        <div style="padding: 0 30px;">
            <div style="font-size:0.65rem; color:#94a3b8; font-weight:800; margin-bottom:5px; text-transform:uppercase;">📊 Whole Month Scorecard for: <span style="color:var(--primary); font-size:0.75rem;">${previousScorecardMonth}</span></div>
            <table class="breakdown-table">
                <thead><tr><th>F_SCR</th><th>Phone Time</th><th>QA</th><th>Standard Score</th></tr></thead>
                <tbody><tr><td>${fScr}%</td><td>${phoneTime}%</td><td>${qaScore}%</td><td><span class="${badgeStyle}">${standardScore}%</span></td></tr></tbody>
            </table>
            <div style="font-size:0.65rem; color:#94a3b8; font-weight:800; margin-top:20px; margin-bottom:5px; text-transform:uppercase;">📅 Weekly Scores for Current Month:</div>
            <div class="mtd-grid">
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W1</div><div style="font-weight:800; color:white;">${s1}%</div></div>
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W2</div><div style="font-weight:800; color:white;">${s2}%</div></div>
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W3</div><div style="font-weight:800; color:white;">${s3}%</div></div>
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W4</div><div style="font-weight:800; color:white;">${s4}%</div></div>
                <div style="text-align:center; border-left:2px solid var(--primary); padding-left:10px;"><div style="font-size:0.6rem; color:var(--primary);">MTD</div><div style="color:var(--primary); font-weight:800;">${mtdAverage}%</div></div>
            </div>
        </div><div style="margin-bottom:20px;"></div>`;
    }

    function updateProgressBar() {
        const mtd = parseFloat(document.getElementById('mtdValue').innerText); const bar = document.getElementById('mtdBar'); if(!bar) return;
        bar.style.width = mtd + "%";
        if (mtd >= 90) bar.style.background = "#22c55e"; else if (mtd >= 75) bar.style.background = "#f59e0b"; else bar.style.background = "#ef4444";
    }

    function openAgentModal() { document.getElementById('pwInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; }
    function openAdminModal() { document.getElementById('adminPwInput').value = ''; document.getElementById('adminModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function verifyAdmin() { if (document.getElementById('adminPwInput').value === "Jeikaaru-08!") { window.location.href = "admin.html"; } else { alert("❌ Unauthorized"); } }
    function verifyAndShowScores() { if(activeAgent && document.getElementById('pwInput').value.trim() === activeAgent.password.toString().trim()) { isUnlocked = true; renderDashboard(); closeModal('passwordModal'); } else { alert('❌ Incorrect Access Code'); } }
  </script>
</body>
</html>
