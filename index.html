<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Analytics | Premium Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #f59e0b;    
      --primary-dark: #d97706;
      --bg: #fef3c7;         /* Warm Cream/Yellow Background */
      --card: #0f172a;       /* Dark Navy Card */
      --text-light: #f8fafc; 
      --text-dark: #0f172a;
      --border: #334155;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg); color: var(--text-dark); 
      margin: 0; padding: 0; font-size: 14px;
    }

    .header-main { 
      background: #020617; 
      padding: 20px 0; text-align: center; color: var(--primary);
      border-bottom: 5px solid var(--primary);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .header-main h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; }

    .nav-bar { 
      background: rgba(15, 23, 42, 0.95); 
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--primary); 
      padding: 12px 0; position: sticky; top: 0; z-index: 100;
      overflow-x: auto;
    }
    .nav-inner { display: flex; justify-content: center; gap: 10px; padding: 0 15px; flex-wrap: wrap; }
    
    .agent-pill { 
      padding: 8px 18px; border-radius: 30px; border: 1px solid var(--border); 
      background: #1e293b; color: #94a3b8; font-weight: 700; 
      font-size: 0.75rem; cursor: pointer; transition: 0.3s; 
      display: flex; align-items: center; gap: 8px;
    }
    .agent-pill:hover { border-color: var(--primary); color: var(--primary); }
    .agent-pill.active { background: var(--primary); color: var(--text-dark); border-color: var(--primary); }
    
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    .content-container { max-width: 900px; margin: 40px auto; padding: 0 20px 80px; }

    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
    .kpi-box { padding: 25px 15px; border-radius: 24px; text-align: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    
    .kpi-1 { background: var(--card); color: var(--primary); border: 1px solid var(--primary); } 
    .kpi-2 { background: var(--primary); color: var(--text-dark); } 
    .kpi-3 { background: #334155; color: white; }

    .kpi-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; opacity: 0.8; }
    .kpi-value { font-size: 1.8rem; font-weight: 800; }

    .main-card { 
      background: var(--card); border-radius: 32px; border: none; 
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4); overflow: hidden; color: var(--text-light);
    }
    .card-head { 
      padding: 30px; display: flex; justify-content: space-between; 
      align-items: center; border-bottom: 1px solid var(--border); background: #1e293b;
    }
    .card-head h2 { margin: 0; font-size: 1.6rem; font-weight: 800; color: var(--primary); }

    .btn-group { display: flex; gap: 10px; align-items: center; }
    .unlock-btn { background: var(--primary); color: var(--text-dark); padding: 10px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .msg-btn { background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 8px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; }

    .table-block { padding: 30px; border-bottom: 1px solid var(--border); }
    .table-block h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 20px; display: flex; justify-content: space-between; }
    .badge { background: var(--primary); color: var(--text-dark); padding: 4px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }

    table { width: 100%; border-collapse: collapse; }
    td { padding: 18px 10px; border-top: 1px solid var(--border); color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }

    .quote-style { 
      font-weight: 600; color: #fde68a; background: #334155; 
      padding: 4px 10px; border-radius: 8px; border-left: 4px solid var(--primary); 
      display: inline-block; margin: 5px 0;
    }

    .modal { display: none; position: fixed; inset: 0; background:rgba(2, 6, 23, 0.85); backdrop-filter:blur(10px); z-index: 200; justify-content:center; align-items:center; }
    .modal-content { background:var(--card); padding:40px; border-radius:30px; width:340px; text-align:center; border: 2px solid var(--primary); }
    .modal-content input { width:100%; padding:15px; margin:20px 0; border:2px solid var(--border); background: #020617; color:white; border-radius:15px; text-align:center; font-size: 1.5rem; font-weight: 800; }
    
    .btn-confirm { background: var(--primary); color: var(--text-dark); padding: 15px; border:none; border-radius:15px; width: 100%; font-weight:800; cursor:pointer; font-size: 1rem; }

    @media (max-width: 600px) { .kpi-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="header-main"><h1>QA PERFORMANCE DASHBOARD</h1></header>
  <nav class="nav-bar"><div id="agentPills" class="nav-inner"></div></nav>
  
  <div class="content-container">
    <div id="dashboardView"></div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🔐 Enter Access Code</h3>
      <input type="password" id="pwInput" placeholder="••••" maxlength="10" />
      <button class="btn-confirm" id="btnGo">VERIFY</button>
      <p onclick="closeModal()" style="color:var(--text-muted); cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>

  <script>
    let db = [];
    let activeAgent = null;
    const TARGET_QA = 15;
    const TARGET_AUDIT = 20;
    const MY_EMAIL = "hitsuguya08@gmail.com"; 

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json').then(r => r.json()).then(data => {
        db = data.sort((a,b) => parseFloat(b.score || 0) - parseFloat(a.score || 0));
        renderPills(db);
      }).catch(err => {
        document.getElementById('dashboardView').innerHTML = `<div style="text-align:center; padding:50px;">Please ensure data.json is in the same folder.</div>`;
      });
    });

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        const s = parseFloat(agent.score || 0);
        const c = s >= 90 ? '#10b981' : (s >= 80 ? '#fbbf24' : '#ff4d4d');
        pill.innerHTML = `<div class="dot" style="background:${c}"></div> ${agent.name}`;
        pill.onclick = () => { renderAgent(agent); [...box.children].forEach(el => el.classList.remove('active')); pill.classList.add('active'); };
        box.appendChild(pill); if(i === 0 && !activeAgent) pill.click();
      });
    }

    function renderAgent(agent) {
      activeAgent = agent;
      const qas = agent.qa || []; const audits = agent.audits || [];
      const countQA = qas.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;
      const countAudit = audits.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">Agent Status</div><div class="kpi-value">ACTIVE</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">Long Calls</div><div class="kpi-value">${countQA} <span style="font-size:1rem; opacity:0.7;">/ ${TARGET_QA}</span></div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">Dispo Audits</div><div class="kpi-value">${countAudit} <span style="font-size:1rem; opacity:0.7;">/ ${TARGET_AUDIT}</span></div></div>
        </div>
        <div class="main-card">
            <div class="card-head">
                <div><h2>${agent.name}</h2><span style="color:#94a3b8; font-size: 0.8rem; text-transform:uppercase; letter-spacing:1px;">Quality Assurance Summary</span></div>
                <div class="btn-group">
                    <button class="unlock-btn" id="btnReveal">🔐 SHOW SCORE</button>
                    <button class="msg-btn" onclick="sendInquiry()">INQUIRE</button>
                    <div id="scoreVal" style="display:none; font-size: 2.2rem; font-weight: 900; color: var(--primary);">${agent.score || '0'}%</div>
                </div>
            </div>
            ${renderTable('Long Calls Evaluation', qas)}
            ${renderTable('Dispo Audits', audits)}
        </div>`;
      
      document.getElementById('btnReveal').onclick = () => { 
        document.getElementById('pwInput').value = '';
        document.getElementById('passwordModal').style.display = 'flex'; 
        document.getElementById('pwInput').focus(); 
      };
    }

    function renderTable(title, data) {
      const activeCount = data.filter(item => (typeof item === 'object' ? item.comment : item).toString().trim().length > 5).length;
      return `
      <div class="table-block">
        <h3><span>${title}</span> <span class="badge">${activeCount} DONE</span></h3>
        <table>
          <tbody>
            ${data.map((item, i) => {
              let txt = (typeof item === 'object' ? item.comment : item) || ""; 
              txt = txt.toString().trim();
              if (txt.length <= 5) return "";
              let formatted = txt.replace(/^(\d{2}-\d{2}-\d{2})/g, '<b>$1</b>').replace(/"([^"]+)"/g, '<span class="quote-style">"$1"</span>').replace(/\n/g, '<br>');
              return `<tr><td style="width:40px; color:var(--primary); font-weight:800; font-size:1.1rem;">${i+1}</td><td>${formatted}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    }

    function sendInquiry() {
        const subject = encodeURIComponent(`Inquiry: ${activeAgent.name}`);
        window.location.href = `mailto:${MY_EMAIL}?subject=${subject}`;
    }

    function closeModal() { document.getElementById('passwordModal').style.display = 'none'; }
    
    // FIX PARA SA PASSWORD ERROR
    document.getElementById('btnGo').onclick = () => {
      const inputPw = document.getElementById('pwInput').value.trim();
      
      if(activeAgent && inputPw === activeAgent.password.toString().trim()) {
          document.getElementById('scoreVal').style.display = 'block'; 
          document.getElementById('btnReveal').style.display = 'none'; 
          closeModal();
      } else { 
          alert('❌ Incorrect Access Code. Please try again.'); 
      }
    };

    window.onclick = (e) => { if(e.target == document.getElementById('passwordModal')) closeModal(); }
  </script>
</body>
</html>
