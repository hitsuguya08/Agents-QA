<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Dashboard | Standard View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981; --bg: #f3f4f6; --text: #111827; --text-muted: #6b7280; --border: #e5e7eb;
      --box-blue: #3b82f6; --box-green: #10b981; --box-purple: #8b5cf6;
    }
    * { box-sizing: border-box; }
    
    /* Tinaasan ang base font size para mas malinaw */
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 14.5px; line-height: 1.6; }

    /* HEADER */
    .header-main { 
      background: linear-gradient(135deg, #064e3b, #10b981); 
      padding: 20px 0; text-align: center; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header-main h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

    /* NAV BAR */
    .nav-bar { background: white; border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 100; overflow-x: auto; }
    .nav-inner { display: flex; justify-content: center; gap: 10px; padding: 0 20px; min-width: max-content; margin: 0 auto; }
    .agent-pill { 
      padding: 8px 18px; border-radius: 30px; border: 1px solid var(--border); background: white; 
      color: var(--text-muted); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .agent-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
    .dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid white; }

    /* CONTAINER - Pinalapad nang kaunti (950px) */
    .content-container { max-width: 750px; margin: 40px auto; padding: 0 20px 60px; }

    /* KPI BOXES - Slightly larger */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 18px; margin-bottom: 30px; }
    .kpi-box { padding: 22px; border-radius: 16px; text-align: center; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.2s; }
    .kpi-1 { background: var(--box-blue); } 
    .kpi-2 { background: var(--box-green); } 
    .kpi-3 { background: var(--box-purple); }
    .kpi-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.9; margin-bottom: 6px; letter-spacing: 0.5px; }
    .kpi-value { font-size: 1.6rem; font-weight: 800; display: flex; align-items: baseline; justify-content: center; gap: 5px; }
    .kpi-target { font-size: 1.1rem; opacity: 0.7; font-weight: 400; }

    /* CONTENT CARD */
    .main-card { background: white; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow: hidden; }
    .card-head { padding: 28px 35px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; border-bottom: 1px solid var(--border); }
    .card-head h2 { margin: 0; font-size: 1.6rem; font-weight: 800; }

    .unlock-btn { background: #1e293b; color: white; border: none; padding: 10px 22px; border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
    .unlock-btn:hover { background: #000; transform: translateY(-1px); }
    .score-txt { font-size: 1.8rem; font-weight: 900; color: var(--primary); display: none; }

    /* TABLES - Better spacing and readability */
    .table-block { padding: 30px 35px; border-bottom: 1px solid var(--border); }
    .table-block h3 { margin: 0 0 20px 0; font-size: 1rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #f3f4f6; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { text-align: left; padding: 12px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 20px 12px; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: top; word-wrap: break-word; line-height: 1.6; }
    .num-col { width: 55px; text-align: center; font-weight: 800; color: #cbd5e1; }

    /* FORMATTING */
    .date-bold { font-weight: 800; color: var(--text); }
    .quote-box { font-weight: 700; color: #065f46; background: #ecfdf5; padding: 3px 7px; border-radius: 6px; border-left: 4px solid var(--primary); display: inline-block; margin: 4px 0; }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 200; left:0; top:0; width:100%; height:100%; background:rgba(15,23,42,0.6); backdrop-filter:blur(6px); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:40px; border-radius:24px; width:360px; text-align:center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-content input { width:100%; padding:15px; margin:20px 0; border:1px solid var(--border); border-radius:12px; text-align:center; font-size:1.2rem; outline:none; background:#f9fafb; }
    .btn-row { display: flex; gap: 12px; }
    .btn-row button { flex:1; padding: 14px; border:none; border-radius:12px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>

  <header class="header-main">
    <h1>AGENT QA PERFORMANCE TRACKER</h1>
  </header>

  <nav class="nav-bar">
    <div id="agentPills" class="nav-inner"></div>
  </nav>

  <div class="content-container">
    <div id="dashboardView"></div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="margin:0">Verify Identity</h3>
      <input type="password" id="pwInput" placeholder="Password" />
      <div class="btn-row">
        <button style="background:var(--primary); color:white;" id="btnGo">Unlock</button>
        <button style="background:#f3f4f6;" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let db = [];
    let activeAgent = null;
    const TARGET_QA = 15;
    const TARGET_AUDIT = 20;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json').then(r => r.json()).then(data => {
        db = data.sort((a,b) => parseFloat(b.score || 0) - parseFloat(a.score || 0));
        renderPills(db);
      });
    });

    function cleanName(n) { return n ? n.split('(')[0].trim() : "Unnamed"; }

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        const s = parseFloat(agent.score || 0);
        const c = s >= 90 ? '#10b981' : (s >= 80 ? '#f59e0b' : '#ef4444');
        pill.innerHTML = `<div class="dot" style="background:${c}"></div> ${cleanName(agent.name)}`;
        pill.onclick = () => { renderAgent(agent); [...box.children].forEach(el => el.classList.remove('active')); pill.classList.add('active'); };
        box.appendChild(pill); if(i === 0 && !activeAgent) pill.click();
      });
    }

    function renderAgent(agent) {
      activeAgent = agent;
      const qas = agent.qa || []; const audits = agent.audits || [];
      const countQA = qas.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;
      const countAudit = audits.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">Status</div><div class="kpi-value" style="font-size:1.4rem">ACTIVE</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">Long Calls</div><div class="kpi-value">${countQA} <span class="kpi-target">/ ${TARGET_QA}</span></div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">Audits</div><div class="kpi-value">${countAudit} <span class="kpi-target">/ ${TARGET_AUDIT}</span></div></div>
        </div>
        <div class="main-card">
            <div class="card-head">
                <div><h2>${cleanName(agent.name)}</h2><span style="color:var(--text-muted); font-weight:600;">QA Evaluation Summary</span></div>
                <div><button class="unlock-btn" id="btnReveal">🔐 Reveal Score</button><div class="score-txt" id="scoreVal">${agent.score || '0'}%</div></div>
            </div>
            ${renderTable('Long Calls Evaluation', qas)}
            ${renderTable('Audit Feedback', audits)}
        </div>`;
      document.getElementById('btnReveal').onclick = () => { document.getElementById('pwInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; document.getElementById('pwInput').focus(); };
    }

    function renderTable(title, data) {
      const activeCount = data.filter(item => (typeof item === 'object' ? item.comment : item).toString().trim().length > 5).length;
      return `<div class="table-block"><h3><span>${title}</span> <span class="badge">${activeCount} Evaluated</span></h3>
        <table><thead><tr><th class="num-col">#</th><th>Feedback Details</th></tr></thead><tbody>
        ${data.map((item, i) => {
          let txt = (typeof item === 'object' ? item.comment : item) || ""; txt = txt.toString().trim();
          if (txt.length <= 5) return `<tr><td class="num-col">${i+1}</td><td><span style="color:#cbd5e1">---</span></td></tr>`;
          
          let formatted = txt
            .replace(/^(\d{2}-\d{2}-\d{2})/g, '<strong class="date-bold">$1</strong>')
            .replace(/"([^"]+)"/g, '<span class="quote-box">"$1"</span>')
            .replace(/\n/g, '<br>');
            
          return `<tr><td class="num-col">${i+1}</td><td>${formatted}</td></tr>`;
        }).join('')}</tbody></table></div>`;
    }

    function closeModal() { document.getElementById('passwordModal').style.display = 'none'; }
    document.getElementById('btnGo').onclick = () => {
      if(document.getElementById('pwInput').value.trim() === activeAgent.password.toString()) {
          document.getElementById('scoreVal').style.display = 'block'; document.getElementById('btnReveal').style.display = 'none'; closeModal();
      } else { alert('❌ Incorrect password.'); }
    };
  </script>
</body>
</html>
