<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Pro Dashboard | Performance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #065f46;
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }

    .header-top { background: white; border-bottom: 1px solid var(--border); padding: 20px 0; text-align: center; position: sticky; top: 0; z-index: 50; }
    .header-top h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }

    /* MODERN HORIZONTAL NAVIGATION */
    .nav-container { background: white; border-bottom: 1px solid var(--border); padding: 10px 0; overflow-x: auto; white-space: nowrap; display: flex; justify-content: center; position: sticky; top: 73px; z-index: 49; }
    .agent-nav { display: flex; gap: 10px; padding: 0 20px; }
    .nav-item { 
      padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border); background: white; 
      color: var(--text-muted); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; 
      display: flex; align-items: center; gap: 8px;
    }
    .nav-item:hover { background: #f3f4f6; color: var(--text); }
    .nav-item.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }

    .main-wrapper { max-width: 1100px; margin: 30px auto; padding: 0 20px 60px; }

    /* DASHBOARD STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .stat-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
    .stat-target { font-size: 1.1rem; color: #cbd5e1; font-weight: 400; }

    /* CONTENT CARD */
    .agent-details { background: white; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow: hidden; }
    .details-header { padding: 30px; border-bottom: 1px solid var(--border); background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
    .details-header h2 { margin: 0; font-size: 1.8rem; font-weight: 800; }

    .reveal-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .reveal-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .final-score { font-size: 2rem; font-weight: 800; color: var(--primary); display: none; }

    /* TABLES */
    .table-section { padding: 30px; border-bottom: 1px solid var(--border); }
    .table-section:last-child { border-bottom: none; }
    .table-section h3 { margin: 0 0 20px 0; font-size: 1.1rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #f3f4f6; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { text-align: left; padding: 12px 15px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 18px 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: top; word-wrap: break-word; line-height: 1.6; }
    .col-num { width: 60px; text-align: center; font-weight: 700; color: #cbd5e1; }

    /* FORMATTING */
    .date-bold { font-weight: 700; color: var(--text); }
    .quote { font-weight: 700; color: #065f46; background: #f0fdf4; padding: 2px 6px; border-radius: 4px; border-left: 3px solid var(--primary); }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; }
    .modal-box { background: white; padding: 40px; border-radius: 24px; width: 360px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal-box input { width: 100%; padding: 16px; margin: 20px 0; border: 1px solid var(--border); border-radius: 12px; text-align: center; font-size: 1.2rem; background: #f9fafb; outline: none; }
    .modal-box input:focus { border-color: var(--primary); }
    .btn-row { display: flex; gap: 12px; }
    .btn-row button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

    @media (max-width: 640px) {
      .details-header { flex-direction: column; gap: 20px; text-align: center; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header-top">
    <h1>AGENT QA PERFORMANCE</h1>
  </div>

  <div class="nav-container">
    <div id="topNav" class="agent-nav"></div>
  </div>

  <main class="main-wrapper">
    <div id="dashboardArea"></div>
  </main>

  <div id="passwordModal" class="modal">
    <div class="modal-box">
      <h3 style="margin:0">Unlock Performance</h3>
      <input type="password" id="passIn" placeholder="Enter Password" />
      <div class="btn-row">
        <button style="background:var(--primary); color:white;" id="btnVerify">Verify</button>
        <button style="background:#f3f4f6; color:var(--text-muted);" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let dbData = [];
    let activeAgent = null;

    // TARGET SETTINGS
    const TARGET_QA = 15;
    const TARGET_AUDIT = 20;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json').then(r => r.json()).then(data => {
        dbData = data.sort((a,b) => parseFloat(b.score) - parseFloat(a.score));
        renderTopNav(dbData);
      });
    });

    function renderTopNav(agents) {
      const nav = document.getElementById('topNav');
      nav.innerHTML = '';
      agents.forEach((agent, i) => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        const s = parseFloat(agent.score);
        const c = s >= 90 ? '#10b981' : (s >= 80 ? '#f59e0b' : '#ef4444');
        
        item.innerHTML = `<div class="status-dot" style="background:${c}"></div> ${agent.name}`;
        item.onclick = () => {
          renderDashboard(agent);
          [...nav.children].forEach(el => el.classList.remove('active'));
          item.classList.add('active');
        };
        nav.appendChild(item);
        if(i === 0 && !activeAgent) item.click();
      });
    }

    function renderDashboard(agent) {
      activeAgent = agent;
      const qas = agent.qa || [];
      const audits = agent.audits || [];

      // Smart Counting (>5 chars)
      const countQA = qas.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;
      const countAudit = audits.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;

      document.getElementById('dashboardArea').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Verified ID</div><div class="stat-value">${agent.id || 'N/A'}</div></div>
            <div class="stat-card"><div class="stat-label">Long Calls Evaluation</div><div class="stat-value">${countQA} <span class="stat-target">/ ${TARGET_QA}</span></div></div>
            <div class="stat-card"><div class="stat-label">Dispo Audits Completed</div><div class="stat-value">${countAudit} <span class="stat-target">/ ${TARGET_AUDIT}</span></div></div>
        </div>

        <div class="agent-details">
            <div class="details-header">
                <div><h2>${agent.name}</h2><span style="color:var(--text-muted); font-weight:600;">Agent Insights & Feedback</span></div>
                <div>
                    <button class="reveal-btn" id="btnReveal">🔐 Reveal QA Score</button>
                    <div class="final-score" id="scoreDisplay">${agent.score}%</div>
                </div>
            </div>
            ${renderTable('Long Calls Feedback', qas)}
            ${renderTable('Dispo Audit Feedback', audits)}
        </div>`;

      document.getElementById('btnReveal').onclick = () => {
        document.getElementById('passIn').value = '';
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passIn').focus();
      };
    }

    function renderTable(title, data) {
      const activeCount = data.filter(item => (typeof item === 'object' ? item.comment : item).toString().trim().length > 5).length;
      return `
        <div class="table-section">
            <h3><span>${title}</span> <span class="badge">${activeCount} active records</span></h3>
            <table>
                <thead><tr><th class="col-num">#</th><th>Observations & Commentary</th></tr></thead>
                <tbody>
                    ${data.length > 0 ? data.map((item, i) => {
                        const raw = (typeof item === 'object' ? item.comment : item) || "";
                        const txt = raw.toString().trim();
                        const isReal = txt.length > 5;
                        const fmt = isReal ? txt.replace(/^(\d{2}-\d{2}-\d{2})/g, '<span class="date-bold">$1</span>')
                                                 .replace(/"([^"]+)"/g, '<span class="quote">"$1"</span>')
                                                 .replace(/\n/g, '<br>') : '<span style="color:#e5e7eb">---</span>';
                        return `<tr><td class="col-num">${i+1}</td><td>${fmt}</td></tr>`;
                    }).join('') : '<tr><td colspan="2" style="text-align:center; padding:40px; color:#ccc">No data available.</td></tr>'}
                </tbody>
            </table>
        </div>`;
    }

    function closeModal() { document.getElementById('passwordModal').style.display = 'none'; }
    document.getElementById('btnVerify').onclick = () => {
      if(document.getElementById('passIn').value.trim() === activeAgent.password.toString()) {
          document.getElementById('scoreDisplay').style.display = 'block';
          document.getElementById('btnReveal').style.display = 'none';
          closeModal();
      } else { alert('Incorrect password!'); }
    };
  </script>
</body>
</html>
