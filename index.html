<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Pro | Insights Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981; --bg: #f3f4f6; --text: #1e293b; 
      --text-muted: #64748b; --border: #e2e8f0; --accent: #4f46e5;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); 
      color: var(--text); margin: 0; padding: 0; font-size: 14px; 
    }
    .header-main { 
      background: linear-gradient(to right, #0f172a, #1e293b); 
      padding: 20px 0; text-align: center; color: white; border-bottom: 4px solid var(--primary);
    }
    .nav-bar { 
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 100;
    }
    .nav-inner { display: flex; justify-content: center; gap: 10px; }
    .agent-pill { 
      padding: 8px 18px; border-radius: 12px; border: 1px solid var(--border); 
      background: white; cursor: pointer; font-weight: 700; font-size: 0.75rem;
      transition: 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .agent-pill.active { background: var(--primary); color: white; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .content-container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
    .kpi-box { padding: 24px; border-radius: 20px; text-align: center; color: white; font-weight: 800; }
    .kpi-1 { background: linear-gradient(135deg, #4f46e5, #818cf8); } 
    .kpi-2 { background: linear-gradient(135deg, #059669, #34d399); } 
    .kpi-3 { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
    .main-card { background: white; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; }
    .card-head { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; }
    .modal { display: none; position: fixed; z-index: 200; left:0; top:0; width:100%; height:100%; background:rgba(15,23,42,0.6); backdrop-filter:blur(8px); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:35px; border-radius:28px; width:320px; text-align:center; }
    .btn-confirm { background: var(--primary); color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #94a3b8; font-size: 0.7rem; padding: 10px; }
    td { padding: 15px 10px; border-top: 1px solid #f1f5f9; }
  </style>
</head>
<body>
  <header class="header-main"><h1>QA PERFORMANCE INSIGHTS</h1></header>
  <nav class="nav-bar"><div id="agentPills" class="nav-inner"></div></nav>
  <div class="content-container"><div id="dashboardView"></div></div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3>🔒 Security Check</h3>
      <input type="password" id="pwInput" style="width:100%; padding:10px; margin:10px 0;" placeholder="••••" />
      <button class="btn-confirm" id="btnGo">Confirm</button>
      <button onclick="closeModal()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">Cancel</button>
    </div>
  </div>

  <script>
    // Mismo nga code sa Part 2 script... (I-paste diri ang script gikan sa miaging chat)
    let db = [];
    let activeAgent = null;
    const TARGET_QA = 15;
    const TARGET_AUDIT = 20;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json').then(r => r.json()).then(data => {
        db = data;
        renderPills(db);
      }).catch(err => {
        document.getElementById('dashboardView').innerHTML = "Check if data.json exists in the same folder.";
      });
    });

    function renderPills(agents) {
      const box = document.getElementById('agentPills');
      agents.forEach((agent, i) => {
        const pill = document.createElement('div');
        pill.className = 'agent-pill';
        pill.innerHTML = `<div class="dot"></div> ${agent.name}`;
        pill.onclick = () => { renderAgent(agent); };
        box.appendChild(pill);
        if(i===0) pill.click();
      });
    }

    function renderAgent(agent) {
      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
          <div class="kpi-box kpi-1">STATUS: ACTIVE</div>
          <div class="kpi-box kpi-2">QA: ${agent.qa.length}</div>
          <div class="kpi-box kpi-3">AUDITS: ${agent.audits.length}</div>
        </div>
        <div class="main-card">
          <div class="card-head"><h2>${agent.name}</h2></div>
          <div style="padding:20px;"><table><tr><th>Feedback</th></tr>${agent.qa.map(q => `<tr><td>${q}</td></tr>`).join('')}</table></div>
        </div>`;
    }
    function closeModal() { document.getElementById('passwordModal').style.display = 'none'; }
  </script>
</body>
</html>
