<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Pro | Analytics & MTD Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root { --primary: #f59e0b; --bg: #fef3c7; --card: #0f172a; --border: rgba(255,255,255,0.1); }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #000; margin: 0; padding: 0; }
    
    /* USA RA KA HEADER LOGIC */
    .header-main { 
      background: #020617; padding: 15px 30px; color: var(--primary); 
      border-bottom: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center;
    }
    .header-main h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; flex: 1; text-align: center; }
    .admin-btn { background: transparent; color: #94a3b8; font-size: 0.7rem; font-weight: 700; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }

    .nav-bar { background: #0f172a; border-bottom: 1px solid var(--primary); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
    .nav-inner { display: flex; justify-content: center; gap: 10px; padding: 0 15px; flex-wrap: wrap; }
    .agent-pill { padding: 8px 18px; border-radius: 30px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.3s; white-space: nowrap; }
    .agent-pill.active { background: var(--primary); color: #000; border-color: var(--primary); }
    
    .content-container { max-width: 900px; margin: 30px auto; padding: 0 20px 80px; }
    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
    .kpi-box { padding: 20px 10px; border-radius: 24px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 125px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    
    /* AUDITS BOX VISIBILITY FIX */
    .kpi-1 { background: #0f172a; border: 2px solid var(--primary); } 
    .kpi-2 { background: var(--primary); } 
    .kpi-3 { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); } 

    .kpi-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #ffffff !important; opacity: 0.9; }
    .kpi-2 .kpi-label { color: #000 !important; }
    .kpi-value { font-size: 1.8rem; font-weight: 900; line-height: 1; text-transform: uppercase; color: #ffffff !important; }
    .kpi-2 .kpi-value { color: #000 !important; }

    .dashboard-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #020617; padding: 8px; border-radius: 16px; }
    .dash-tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; color: #94a3b8; font-weight: 800; font-size: 0.7rem; cursor: pointer; }
    .dash-tab-btn.active { background: var(--primary); color: #000; }

    .main-card { background: #0f172a; border-radius: 32px; overflow: hidden; color: #ffffff; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .card-head { padding: 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

    .mtd-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; border: 1px solid var(--primary); margin-top: 15px; width: 100%; }
    .table-block { padding: 30px; border-bottom: 1px solid var(--border); }
    .table-block h3 { color: var(--primary); font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 15px 10px; border-top: 1px solid var(--border); color: #ffffff !important; font-size: 0.95rem; line-height: 1.6; vertical-align: top; }
    
    .quote-style { font-weight: 600; color: #fde68a; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; border-left: 3px solid var(--primary); display: inline-block; }

    .modal { display: none; position: fixed; inset: 0; background:rgba(2,6,23,0.95); z-index: 200; justify-content:center; align-items:center; }
    .modal-content { background:#1e293b; padding:40px; border-radius:30px; width:340px; text-align:center; border: 2px solid var(--primary); }
    .btn-verify { background: var(--primary); color: #000; padding: 15px; border:none; border-radius:15px; width: 100%; font-weight:800; cursor:pointer; }
    @media (max-width: 600px) { .kpi-row { grid-template-columns: 1fr; } .card-head { flex-direction: column; gap: 15px; text-align: center; } }
  </style>
</head>
<body>
  <header class="header-main">
    <div style="width: 80px;"></div>
    <h1>AGENT ANALYTICS PORTAL</h1>
    <button onclick="openAdminModal()" class="admin-btn">ADMIN</button>
  </header>

  <nav class="nav-bar"><div id="agentPills" class="nav-inner"></div></nav>
  <div class="content-container"><div id="dashboardView"></div></div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🔐 UNLOCK MTD SCORES</h3>
      <input type="password" id="pwInput" style="width:100%; padding:15px; margin:20px 0; background:#000; color:#fff; border:1px solid #444; text-align:center; font-size:1.5rem; border-radius:15px;" placeholder="••••" />
      <button class="btn-verify" onclick="verifyAndShowScores()">VERIFY ACCESS</button>
      <p onclick="closeModal('passwordModal')" style="color:#94a3b8; cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>

  <div id="adminModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🚨 ADMIN ACCESS</h3>
      <input type="password" id="adminPwInput" style="width:100%; padding:15px; margin:20px 0; background:#000; color:#fff; border:1px solid #444; text-align:center; font-size:1.5rem; border-radius:15px;" placeholder="••••" />
      <button class="btn-verify" onclick="verifyAdmin()">ACCESS EDITOR</button>
      <p onclick="closeModal('adminModal')" style="color:#94a3b8; cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>
  <script>
    let db = { theme: {}, agents: [] };
    let activeAgent = null;
    let currentViewWeek = 'week1';
    let isUnlocked = false;
    const MY_EMAIL = "hitsuguya08@gmail.com"; 

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json?v=' + new Date().getTime())
        .then(r => r.json())
        .then(data => { 
          db = data.agents ? data : { theme: { primary: "#f59e0b" }, agents: data };
          if(db.theme?.primary) document.documentElement.style.setProperty('--primary', db.theme.primary);
          renderPills(db.agents); 
        })
        .catch(() => { document.getElementById('dashboardView').innerHTML = `<h3 style="color:var(--primary); text-align:center; padding:50px;">Syncing...</h3>`; });
    });

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        pill.innerHTML = `<div class="dot" style="background:var(--primary); width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px;"></div> ${agent.name}`;
        pill.onclick = () => { selectAgent(agent, pill); };
        box.appendChild(pill); if(i === 0) pill.click();
      });
    }

    function selectAgent(agent, element) {
      activeAgent = agent; isUnlocked = false; currentViewWeek = 'week1';
      document.querySelectorAll('.agent-pill').forEach(el => el.classList.remove('active'));
      element.classList.add('active'); renderDashboard();
    }

    function switchDashboardWeek(week) { currentViewWeek = week; renderDashboard(); }

    function renderDashboard() {
      const a = activeAgent;
      if(!a.weekly_data) { a.weekly_data = { week1:{score:0,qa:[],audits:[]}, week2:{score:0,qa:[],audits:[]}, week3:{score:0,qa:[],audits:[]}, week4:{score:0,qa:[],audits:[]} }; }
      const weekly = a.weekly_data[currentViewWeek];
      const qas = weekly.qa || []; const audits = weekly.audits || [];

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">MONTH</div><div class="kpi-value">${a.month || 'MAY'}</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">QA EVALS</div><div class="kpi-value">${qas.length}</div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">AUDITS</div><div class="kpi-value">${audits.length}</div></div>
        </div>
        <div class="dashboard-tabs">
            <button class="dash-tab-btn ${currentViewWeek === 'week1' ? 'active' : ''}" onclick="switchDashboardWeek('week1')">WEEK 1</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week2' ? 'active' : ''}" onclick="switchDashboardWeek('week2')">WEEK 2</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week3' ? 'active' : ''}" onclick="switchDashboardWeek('week3')">WEEK 3</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week4' ? 'active' : ''}" onclick="switchDashboardWeek('week4')">WEEK 4</button>
        </div>
        <div class="main-card">
            <div class="card-head">
                <h2 style="margin:0; color:var(--primary)">${a.name}</h2>
                <div class="btn-group">
                    <button style="background:transparent; color:var(--primary); border:1px solid var(--primary); padding:8px 15px; border-radius:10px; cursor:pointer; font-size:0.7rem; font-weight:800;" onclick="sendInquiry()">✉️ CLARIFY FEEDBACK</button>
                    ${!isUnlocked ? '<button class="btn-verify" style="width:auto; padding:10px 20px; font-size:0.75rem;" onclick="openAgentModal()">🔐 UNLOCK SCORES</button>' : ''}
                </div>
            </div>
            <div style="padding:0 30px;">${isUnlocked ? renderScoreGrid() : ''}</div>
            ${renderTable('QA Feedback (' + currentViewWeek.toUpperCase() + ')', qas, true)}
            ${renderTable('Dispo Audits', audits, false)}
        </div>`;
    }

    function renderScoreGrid() {
      const wd = activeAgent.weekly_data;
      const s = [wd.week1.score||0, wd.week2.score||0, wd.week3.score||0, wd.week4.score||0];
      const valid = s.map(Number).filter(v => v > 0);
      const mtd = valid.length > 0 ? (valid.reduce((a,b) => a+b, 0) / valid.length).toFixed(2) : "0.00";
      return `<div class="mtd-grid">
            <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W1</div><div style="font-weight:800;">${s[0]}%</div></div>
            <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W2</div><div style="font-weight:800;">${s[1]}%</div></div>
            <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W3</div><div style="font-weight:800;">${s[2]}%</div></div>
            <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W4</div><div style="font-weight:800;">${s[3]}%</div></div>
            <div style="text-align:center; border-left:2px solid var(--primary); padding-left:10px;"><div style="font-size:0.6rem; color:var(--primary);">MTD</div><div style="color:var(--primary); font-weight:800;">${mtd}%</div></div>
        </div>`;
    }

    function renderTable(title, data, isQA) {
      if(!data || data.length === 0) return `<div class="table-block"><h3>${title}</h3><p style="color:#ffffff;">No entries recorded.</p></div>`;
      return `<div class="table-block"><h3>${title}</h3><table><tbody>
        ${data.map((item, i) => {
          let text = (typeof item === 'object') ? (item.text || "") : item;
          let link = (isQA && typeof item === 'object') ? (item.link || "") : "";
          let mediaHtml = "";
          
          if (link && link.trim() !== "") {
              // PINAKA-LIG-ON NGA PAGKUHA SA ID
              const driveMatch = link.match(/[-\w]{25,}/);
              if (driveMatch && (link.includes('drive.google') || link.includes('docs.google'))) {
                  const fileId = driveMatch[0]; // KANI ANG FIXED: Naggamit na og [0] para sa string
                  mediaHtml = `<div style="margin-top:15px; border-radius:12px; overflow:hidden; border:1px solid var(--primary); background:#000; height:150px; line-height:0;"><iframe src="https://google.com{fileId}/preview" width="100%" height="150" style="border:none;" allow="autoplay"></iframe></div>`;
              } else {
                  mediaHtml = `<a href="${link}" target="_blank" style="display:inline-block; margin-top:10px; color:var(--primary); border:1px solid var(--primary); padding:6px 15px; border-radius:8px; text-decoration:none; font-size:0.7rem; font-weight:800; background:rgba(255,255,255,0.05);">🔗 OPEN LINK</a>`;
              }
          }
          let fText = text.replace(/"([^"]+)"/g, '<span class="quote-style">"$1"</span>');
          return `<tr><td style="width:35px; color:var(--primary); font-weight:800; vertical-align:top;">${i+1}</td><td style="color:#ffffff;"><div>${fText}</div>${mediaHtml}</td></tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    function sendInquiry() { window.location.href = `mailto:${MY_EMAIL}?subject=QA Inquiry: ${activeAgent.name} (${currentViewWeek.toUpperCase()})`; }
    function openAgentModal() { document.getElementById('pwInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; }
    function openAdminModal() { document.getElementById('adminPwInput').value = ''; document.getElementById('adminModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function verifyAdmin() { if (document.getElementById('adminPwInput').value === "Jeikaaru-08!") { window.location.href = "admin.html"; } else { alert("❌ Unauthorized"); } }
    function verifyAndShowScores() { if(activeAgent && document.getElementById('pwInput').value.trim() === activeAgent.password.toString().trim()) { isUnlocked = true; renderDashboard(); closeModal('passwordModal'); } else { alert('❌ Incorrect Access Code'); } }
  </script>
</body>
</html>
