<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Analytics | Compact Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981; --primary-dark: #064e3b;
      --bg: #f8fafc; --card: #ffffff;
      --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg); color: var(--text); 
      margin: 0; padding: 0; font-size: 15px; line-height: 1.5;
    }

    /* HEADER */
    .header-main { 
      background: var(--text); 
      padding: 25px 0; text-align: center; color: white;
      border-bottom: 3px solid var(--primary);
    }
    .header-main h1 { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; }

    /* STICKY NAV TABS */
    .nav-bar { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border); 
      padding: 12px 0; position: sticky; top: 0; z-index: 100;
      overflow-x: auto;
    }
    .nav-inner { display: flex; justify-content: center; gap: 8px; padding: 0 20px; min-width: max-content; margin: 0 auto; }
    
    .agent-pill { 
      padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border); background: white; 
      color: var(--text-muted); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; 
      display: flex; align-items: center; gap: 8px;
    }
    .agent-pill:hover { border-color: var(--primary); color: var(--primary); }
    .agent-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
    .dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid white; }

    /* COMPACT CONTENT WRAPPER (850px Width) */
    .content-container { max-width: 850px; margin: 30px auto; padding: 0 15px 60px; }

    /* KPI STATS */
    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
    .kpi-box { padding: 25px 15px; border-radius: 16px; text-align: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    
    .kpi-1 { background: linear-gradient(135deg, #1e40af, #3b82f6); } 
    .kpi-2 { background: linear-gradient(135deg, #064e3b, #10b981); } 
    .kpi-3 { background: linear-gradient(135deg, #5b21b6, #8b5cf6); }

    .kpi-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; letter-spacing: 0.5px; margin-bottom: 5px; }
    .kpi-value { font-size: 1.6rem; font-weight: 800; display: flex; align-items: baseline; justify-content: center; gap: 4px; }
    .kpi-target { font-size: 1rem; opacity: 0.6; font-weight: 400; }

    /* MAIN FEEDBACK CARD */
    .main-card { background: white; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
    .card-head { padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8fafc; }
    .card-head h2 { margin: 0; font-size: 1.5rem; font-weight: 800; }

    .unlock-btn { background: #0f172a; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
    .score-txt { font-size: 1.8rem; font-weight: 900; color: var(--primary); display: none; }

    /* TABLES */
    .table-block { padding: 25px 30px; border-bottom: 1px solid #f1f5f9; }
    .table-block:last-child { border-bottom: none; }
    .table-block h3 { margin: 0 0 15px 0; font-size: 1rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #f1f5f9; padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; color: #475569; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { text-align: left; padding: 10px; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 18px 10px; border-bottom: 1px solid #f8fafc; font-size: 0.95rem; vertical-align: top; word-wrap: break-word; color: #334155; }
    .num-col { width: 50px; text-align: center; font-weight: 800; color: #cbd5e1; font-size: 1.1rem; }

    /* FORMATTING */
    .date-bold { font-weight: 800; color: #000; background: #fef9c3; padding: 1px 4px; border-radius: 4px; }
    .quote-style { 
      font-weight: 700; color: #064e3b; background: #ecfdf5; 
      padding: 4px 10px; border-radius: 8px; border-left: 4px solid var(--primary); 
      display: inline-block; margin: 4px 0;
    }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 200; left:0; top:0; width:100%; height:100%; background:rgba(15,23,42,0.6); backdrop-filter:blur(8px); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:40px; border-radius:24px; width:360px; text-align:center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); }
    .modal-content input { width:100%; padding:14px; margin:20px 0; border:1px solid var(--border); border-radius:10px; text-align:center; font-size: 1.2rem; outline:none; background:#f9fafb; font-weight: 700; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row button { flex:1; padding: 14px; border:none; border-radius: 12px; font-weight:700; cursor:pointer; font-size: 0.9rem; }

    @media (max-width: 600px) { .kpi-row { grid-template-columns: 1fr; } .card-head { flex-direction: column; text-align: center; gap: 15px; } }
  </style>
</head>
<body>

  <header class="header-main">
    <h1>AGENT PERFORMANCE HUB</h1>
  </header>

  <nav class="nav-bar">
    <div id="agentPills" class="nav-inner"></div>
  </nav>

  <div class="content-container">
    <div id="dashboardView"></div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="margin:0; font-size: 1.2rem;">Verify to Unlock</h3>
      <input type="password" id="pwInput" placeholder="••••••••" />
      <div class="btn-row">
        <button style="background:var(--primary); color:white;" id="btnGo">Confirm</button>
        <button style="background:#f3f4f6; color:#64748b;" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let db = [];
    let activeAgent = null;
    const TARGET_QA = 15;
    const TARGET_AUDIT = 20;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json').then(r => r.json()).then(data => {
        db = data.sort((a,b) => parseFloat(b.score || 0) - parseFloat(a.score || 0));
        renderPills(db);
      });
    });

    function cleanName(n) { return n ? n.split('(')[0].trim() : "Unnamed"; }

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        const s = parseFloat(agent.score || 0);
        const c = s >= 90 ? '#10b981' : (s >= 80 ? '#f59e0b' : '#ef4444');
        pill.innerHTML = `<div class="dot" style="background:${c}"></div> ${cleanName(agent.name)}`;
        pill.onclick = () => { renderAgent(agent); [...box.children].forEach(el => el.classList.remove('active')); pill.classList.add('active'); };
        box.appendChild(pill); if(i === 0 && !activeAgent) pill.click();
      });
    }

    function renderAgent(agent) {
      activeAgent = agent;
      const qas = agent.qa || []; const audits = agent.audits || [];
      const countQA = qas.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;
      const countAudit = audits.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">Status</div><div class="kpi-value">ACTIVE</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">Long Calls</div><div class="kpi-value">${countQA} <span class="kpi-target">/ ${TARGET_QA}</span></div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">Audits</div><div class="kpi-value">${countAudit} <span class="kpi-target">/ ${TARGET_AUDIT}</span></div></div>
        </div>
        <div class="main-card">
            <div class="card-head">
                <div><h2>${cleanName(agent.name)}</h2><span style="color:var(--text-muted); font-weight:600; font-size: 0.8rem;">Evaluation Summary</span></div>
                <div><button class="unlock-btn" id="btnReveal">🔐 Reveal Score</button><div class="score-txt" id="scoreVal">${agent.score || '0'}%</div></div>
            </div>
            ${renderTable('Long Calls Evaluation', qas)}
            ${renderTable('Compliance & Audit Feedback', audits)}
        </div>`;
      document.getElementById('btnReveal').onclick = () => { document.getElementById('pwInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; document.getElementById('pwInput').focus(); };
    }

    function renderTable(title, data) {
      const activeCount = data.filter(item => (typeof item === 'object' ? item.comment : item).toString().trim().length > 5).length;
      return `<div class="table-block"><h3><span>${title}</span> <span class="badge">${activeCount} active</span></h3>
        <table><thead><tr><th class="num-col">#</th><th>Feedback & Comments</th></tr></thead><tbody>
        ${data.map((item, i) => {
          let txt = (typeof item === 'object' ? item.comment : item) || ""; txt = txt.toString().trim();
          if (txt.length <= 5) return `<tr><td class="num-col">${i+1}</td><td><span style="color:#cbd5e1">---</span></td></tr>`;
          let formatted = txt.replace(/^(\d{2}-\d{2}-\d{2})/g, '<strong class="date-bold">$1</strong>').replace(/"([^"]+)"/g, '<span class="quote-style">"$1"</span>').replace(/\n/g, '<br>');
          return `<tr><td class="num-col">${i+1}</td><td>${formatted}</td></tr>`;
        }).join('')}</tbody></table></div>`;
    }

    function closeModal() { document.getElementById('passwordModal').style.display = 'none'; }
    document.getElementById('btnGo').onclick = () => {
      if(document.getElementById('pwInput').value.trim() === activeAgent.password.toString()) {
          document.getElementById('scoreVal').style.display = 'block'; document.getElementById('btnReveal').style.display = 'none'; closeModal();
      } else { alert('❌ Wrong password.'); }
    };
  </script>
</body>
</html>
