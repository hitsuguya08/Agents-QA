<body>
  <header class="header-main">
    <div style="width: 80px;"></div>
    <h1>AGENT ANALYTICS PORTAL</h1>
    <button onclick="openAdminModal()" class="admin-btn">ADMIN</button>
  </header>
  <nav class="nav-bar"><div id="agentPills" class="nav-inner"></div></nav>
  <div class="content-container"><div id="dashboardView"></div></div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🔐 UNLOCK MTD SCORES</h3>
      <input type="password" id="pwInput" style="width:100%; padding:15px; margin:20px 0; background:#000; color:#fff; border:1px solid #444; text-align:center; font-size:1.5rem; border-radius:15px;" placeholder="••••" />
      <button class="btn-verify" onclick="verifyAndShowScores()">VERIFY ACCESS</button>
      <p onclick="closeModal('passwordModal')" style="color:#94a3b8; cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>

  <div id="adminModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🚨 ADMIN ACCESS</h3>
      <input type="password" id="adminPwInput" style="width:100%; padding:15px; margin:20px 0; background:#000; color:#fff; border:1px solid #444; text-align:center; font-size:1.5rem; border-radius:15px;" placeholder="••••" />
      <button class="btn-verify" onclick="verifyAdmin()">ACCESS EDITOR</button>
      <p onclick="closeModal('adminModal')" style="color:#94a3b8; cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>

  <script>
    // CLEANED TABLE RENDERER - GITANGTANG NA ANG BACKUP AUDIO LINK BUTTON
    function renderTable(title, data, isQA) {
      if(!data || data.length === 0) return `<div class="table-block"><h3>${title}</h3><p style="color:#ffffff; font-size:0.8rem; margin-top:10px;">No entries recorded.</p></div>`;
      return `<div class="table-block"><h3>${title}</h3><table><tbody>
        ${data.map((item, i) => {
          let text = (typeof item === 'object') ? (item.text || "") : item;
          let link = (isQA && typeof item === 'object') ? (item.link || "") : "";
          
          let numBlock = `<td style="width:40px; color:var(--primary); font-size:1.1rem; font-weight:800; padding:15px 0; vertical-align:top; line-height:1;">${i+1}</td>`;
          let fText = text.replace(/"([^"]+)"/g, '<span class="quote-style">"$1"</span>');
          
          // AUDIO CONTROLS GENERATOR (PURE AUDIO PLAYER ONLY)
          let mediaHtml = "";
          if (link && link.trim() !== "") {
              let streamUrl = link.trim();
              if (streamUrl.includes("://google.com")) {
                  let fileId = streamUrl.split("/file/d/")[1].split("/")[0];
                  streamUrl = `https://google.com{fileId}`;
              }
              
              mediaHtml = `
                <div style="margin-top:12px;">
                    <audio controls class="dashboard-player" src="${streamUrl}" preload="none"></audio>
                </div>`;
          }
          
          return `<tr>${numBlock}<td style="color:#ffffff; padding:15px 10px; vertical-align:top;"><div>${fText}</div>${mediaHtml}</td></tr>`;
        }).join('')}
      </tbody></table></div>`;
    }
  </script>
  <script>
    let db = { theme: {}, agents: [] };
    let activeAgent = null; let currentViewWeek = 'week1'; let isUnlocked = false;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json?v=' + new Date().getTime()).then(r => r.json()).then(data => { 
          db = data.agents ? data : { theme: { primary: "#f59e0b" }, agents: data };
          if(db.theme?.primary) {
              const root = document.documentElement;
              root.style.setProperty('--primary', db.theme.primary);
              root.style.setProperty('--bg', db.theme.bg || "#fef3c7");
              root.style.setProperty('--card', db.theme.card || "#0f172a");
          }
          renderPills(db.agents); 
        });
    });

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        pill.innerHTML = `<div class="dot" style="background:var(--primary); width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px;"></div> ${agent.name}`;
        pill.onclick = () => { selectAgent(agent, pill); };
        box.appendChild(pill); if(i === 0) pill.click();
      });
    }

    function selectAgent(agent, element) {
      activeAgent = agent; isUnlocked = false; currentViewWeek = 'week1';
      document.querySelectorAll('.agent-pill').forEach(el => el.classList.remove('active'));
      element.classList.add('active'); renderDashboard();
    }

    function switchDashboardWeek(week) { currentViewWeek = week; renderDashboard(); }

    function renderDashboard() {
      const a = activeAgent; 
      if(!a.weekly_data) {
          a.weekly_data = { 
            week1:{score:0,qa:[],audits:[]}, week2:{score:0,qa:[],audits:[]}, 
            week3:{score:0,qa:[],audits:[]}, week4:{score:0,qa:[],audits:[]} 
          };
      }
      const weekly = a.weekly_data[currentViewWeek] || { qa: [], audits: [] };
      const qas = weekly.qa || []; const audits = weekly.audits || [];
      const currentQAControlMonth = a.month || "JUNE"; 

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">MONTH</div><div class="kpi-value">${currentQAControlMonth}</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">QA EVALS</div><div class="kpi-value">${qas.length}</div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">AUDITS</div><div class="kpi-value">${audits.length}</div></div>
        </div>
        <div class="dashboard-tabs">
            <button class="dash-tab-btn ${currentViewWeek === 'week1' ? 'active' : ''}" onclick="switchDashboardWeek('week1')">WEEK 1</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week2' ? 'active' : ''}" onclick="switchDashboardWeek('week2')">WEEK 2</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week3' ? 'active' : ''}" onclick="switchDashboardWeek('week3')">WEEK 3</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week4' ? 'active' : ''}" onclick="switchDashboardWeek('week4')">WEEK 4</button>
        </div>
        <div class="main-card">
            <div class="card-head">
                <h2 style="margin:0; color:var(--primary)">${a.name}</h2>
                <div class="btn-group">
                    <button style="background:transparent; color:var(--primary); border:1px solid var(--primary); padding:8px 15px; border-radius:10px; cursor:pointer; font-size:0.7rem; font-weight:800;" onclick="window.location.href='mailto:hitsuguya08@gmail.com'">✉️ CLARIFY FEEDBACK</button>
                    ${!isUnlocked ? '<button class="btn-verify" style="width:auto; padding:10px 20px; font-size:0.75rem;" onclick="openAgentModal()">🔐 UNLOCK MTD SCORES</button>' : ''}
                </div>
            </div>
            ${isUnlocked ? renderScoreSection() : ''}
            ${renderTable('QA Feedback (' + currentViewWeek.toUpperCase() + ')', qas, true)}
            ${renderTable('Dispo Audits', audits, false)}
        </div>`;
      if(isUnlocked) { setTimeout(updateProgressBar, 100); }
    }

    function renderScoreSection() {
      const fScr = activeAgent.f_scr !== undefined ? activeAgent.f_scr : 0; 
      const phoneTime = activeAgent.phone_time !== undefined ? activeAgent.phone_time : 0;
      const qaScore = activeAgent.qa_score !== undefined ? activeAgent.qa_score : 0;
      const standardScore = activeAgent.score !== undefined ? activeAgent.score : 0; 
      const previousScorecardMonth = activeAgent.scorecard_month || "MAY"; 

      const wd = activeAgent.weekly_data;
      const s1 = wd.week1 ? (wd.week1.score || 0) : 0;
      const s2 = wd.week2 ? (wd.week2.score || 0) : 0;
      const s3 = wd.week3 ? (wd.week3.score || 0) : 0;
      const s4 = wd.week4 ? (wd.week4.score || 0) : 0;
      
      const activeScores = [s1, s2, s3, s4].map(Number).filter(v => v > 0);
      const mtdAverage = activeScores.length > 0 ? (activeScores.reduce((a,b) => a+b, 0) / activeScores.length).toFixed(2) : "0.00";

      let badgeStyle = "status-badge-red";
      if (standardScore >= 75) badgeStyle = "status-badge-yellow";
      if (standardScore >= 90) badgeStyle = "status-badge-green";

      return `
        <div class="progress-section">
            <div class="progress-label-row"><span>PREVIOUS MONTH PERFORMANCE OVERVIEW</span><span id="mtdValue" style="color:var(--primary)">${standardScore}%</span></div>
            <div class="progress-bar-bg"><div id="mtdBar" class="progress-bar-fill"></div></div>
        </div>
        <div style="padding: 0 30px;">
            <div style="font-size:0.65rem; color:#94a3b8; font-weight:800; margin-bottom:5px; text-transform:uppercase;">📊 Whole Month Scorecard for: <span style="color:var(--primary); font-size:0.75rem;">${previousScorecardMonth}</span></div>
            <table class="breakdown-table">
                <thead><tr><th>F_SCR</th><th>Phone Time</th><th>QA</th><th>Standard Score</th></tr></thead>
                <tbody><tr><td>${fScr}%</td><td>${phoneTime}%</td><td>${qaScore}%</td><td><span class="${badgeStyle}">${standardScore}%</span></td></tr></tbody>
            </table>
            <div style="font-size:0.65rem; color:#94a3b8; font-weight:800; margin-top:20px; margin-bottom:5px; text-transform:uppercase;">📅 Weekly Scores for Current Month:</div>
            <div class="mtd-grid">
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W1</div><div style="font-weight:800; color:white;">${wd.week1.score || 0}%</div></div>
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W2</div><div style="font-weight:800; color:white;">${wd.week2.score || 0}%</div></div>
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W3</div><div style="font-weight:800; color:white;">${s3}%</div></div>
                <div style="text-align:center;"><div style="font-size:0.6rem; color:#94a3b8;">W4</div><div style="font-weight:800; color:white;">${s4}%</div></div>
                <div style="text-align:center; border-left:2px solid var(--primary); padding-left:10px;"><div style="font-size:0.6rem; color:var(--primary);">MTD</div><div style="color:var(--primary); font-weight:800;">${mtdAverage}%</div></div>
            </div>
        </div><div style="margin-bottom:20px;"></div>`;
    }

    function updateProgressBar() {
        const mtd = parseFloat(document.getElementById('mtdValue').innerText); const bar = document.getElementById('mtdBar'); if(!bar) return;
        bar.style.width = mtd + "%";
        if (mtd >= 90) bar.style.background = "#22c55e"; else if (mtd >= 75) bar.style.background = "#f59e0b"; else bar.style.background = "#ef4444";
    }

    function openAgentModal() { document.getElementById('pwInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; }
    function openAdminModal() { document.getElementById('adminPwInput').value = ''; document.getElementById('adminModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function verifyAdmin() { if (document.getElementById('adminPwInput').value === "Jeikaaru-08!") { window.location.href = "admin.html"; } else { alert("❌ Unauthorized"); } }
    function verifyAndShowScores() { if(activeAgent && document.getElementById('pwInput').value.trim() === activeAgent.password.toString().trim()) { isUnlocked = true; renderDashboard(); closeModal('passwordModal'); } else { alert('❌ Incorrect Access Code'); } }
  </script>
</body>
</html>
