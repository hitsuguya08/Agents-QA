<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Dashboard | Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981; --primary-dark: #059669;
      --bg: #f3f4f6; --card: #ffffff;
      --text: #111827; --text-muted: #64748b; --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; }

    .header-main { background: white; border-bottom: 1px solid var(--border); padding: 20px 0; text-align: center; }
    .header-main h1 { margin: 0; font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: -0.01em; }

    .nav-bar { background: white; border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 100; overflow-x: auto; }
    .nav-inner { display: flex; justify-content: center; gap: 8px; padding: 0 20px; min-width: max-content; margin: 0 auto; }
    
    .agent-pill { 
      padding: 8px 18px; border-radius: 30px; border: 1px solid var(--border); background: white; 
      color: var(--text-muted); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; 
      display: flex; align-items: center; gap: 8px;
    }
    .agent-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    .content-container { max-width: 950px; margin: 30px auto; padding: 0 20px 60px; }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .kpi-box { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .kpi-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .kpi-value { font-size: 1.6rem; font-weight: 800; display: flex; align-items: baseline; justify-content: center; gap: 4px; }
    .kpi-target { font-size: 1rem; color: #cbd5e1; font-weight: 400; }

    .main-card { background: white; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow: hidden; }
    .card-head { padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; border-bottom: 1px solid var(--border); }
    .card-head h2 { margin: 0; font-size: 1.5rem; font-weight: 800; }

    .unlock-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .score-txt { font-size: 1.8rem; font-weight: 800; color: var(--primary); display: none; }

    .table-block { padding: 25px 30px; border-bottom: 1px solid var(--border); }
    .table-block:last-child { border-bottom: none; }
    .table-block h3 { margin: 0 0 20px 0; font-size: 1rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .badge { background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; color: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { text-align: left; padding: 12px; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 18px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: top; word-wrap: break-word; line-height: 1.6; }
    .num-col { width: 50px; text-align: center; font-weight: 800; color: #cbd5e1; }

    /* STYLING FOR BOLD AND QUOTES */
    .bold-item { font-weight: 800; color: var(--text); }
    .quote { font-weight: 700; color: #065f46; background: #f0fdf4; padding: 2px 6px; border-radius: 4px; border-left: 3.5px solid var(--primary); }

    .modal { display: none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; background:rgba(15,23,42,0.6); backdrop-filter:blur(4px); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:40px; border-radius:24px; width:360px; text-align:center; }
    .modal-content input { width:100%; padding:16px; margin:20px 0; border:1px solid var(--border); border-radius:10px; text-align:center; font-size:1.2rem; outline:none; }
    .btn-row { display: flex; gap: 12px; }
    .btn-row button { flex:1; padding: 14px; border:none; border-radius:12px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>

  <header class="header-main">
    <h1>AGENT QA TRACKER</h1>
  </header>

  <nav class="nav-bar">
    <div id="agentPills" class="nav-inner"></div>
  </nav>

  <div class="content-container">
    <div id="dashboardView"></div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="margin:0">Security Verification</h3>
      <input type="password" id="pwInput" placeholder="Password" />
      <div class="btn-row">
        <button style="background:var(--primary); color:white;" id="btnGo">Unlock</button>
        <button style="background:#f1f5f9; color:var(--text-muted);" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let db = [];
    let activeAgent = null;

    const TARGET_QA = 15;
    const TARGET_AUDIT = 20;

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json').then(r => r.json()).then(data => {
        db = data.sort((a,b) => parseFloat(b.score || 0) - parseFloat(a.score || 0));
        renderPills(db);
      });
    });

    // Mokuha lang sa ngalan (tangtangon ang naa sa sulod sa parentheses)
    function cleanName(name) {
      if (!name) return "Unnamed";
      return name.split('(')[0].trim();
    }

    function renderPills(agents) {
      const box = document.getElementById('agentPills');
      box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div');
        pill.className = 'agent-pill';
        const s = parseFloat(agent.score || 0);
        const c = s >= 90 ? '#10b981' : (s >= 80 ? '#f59e0b' : '#ef4444');
        
        pill.innerHTML = `<div class="dot" style="background:${c}"></div> ${cleanName(agent.name)}`;
        pill.onclick = () => {
          renderAgent(agent);
          [...box.children].forEach(el => el.classList.remove('active'));
          pill.classList.add('active');
        };
        box.appendChild(pill);
        if(i === 0 && !activeAgent) pill.click();
      });
    }

    function renderAgent(agent) {
      activeAgent = agent;
      const qas = agent.qa || [];
      const audits = agent.audits || [];

      const countQA = qas.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;
      const countAudit = audits.filter(x => (typeof x === 'object' ? x.comment : x).toString().trim().length > 5).length;

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box"><div class="kpi-label">Status</div><div class="kpi-value" style="color:var(--primary)">ACTIVE</div></div>
            <div class="kpi-box"><div class="kpi-label">Long Calls</div><div class="kpi-value">${countQA} <span class="kpi-target">/ ${TARGET_QA}</span></div></div>
            <div class="kpi-box"><div class="kpi-label">Audits</div><div class="kpi-value">${countAudit} <span class="kpi-target">/ ${TARGET_AUDIT}</span></div></div>
        </div>

        <div class="main-card">
            <div class="card-head">
                <div><h2>${cleanName(agent.name)}</h2><span style="color:var(--text-muted); font-size:0.8rem; font-weight:600;">Performance Summary</span></div>
                <div>
                    <button class="unlock-btn" id="btnReveal">🔐 Reveal Score</button>
                    <div class="score-txt" id="scoreVal">${agent.score || '0'}%</div>
                </div>
            </div>
            ${renderTable('Long Calls Feedback', qas)}
            ${renderTable('Dispo Audit Feedback', audits)}
        </div>`;

      document.getElementById('btnReveal').onclick = () => {
        document.getElementById('pwInput').value = '';
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('pwInput').focus();
      };
    }

    function renderTable(title, data) {
      const activeCount = data.filter(item => (typeof item === 'object' ? item.comment : item).toString().trim().length > 5).length;
      return `
        <div class="table-block">
            <h3><span>${title}</span> <span class="badge">${activeCount} evaluated</span></h3>
            <table>
                <thead><tr><th class="num-col">#</th><th>Observations & Comments</th></tr></thead>
                <tbody>
                    ${data.map((item, i) => {
                        let txt = (typeof item === 'object' ? item.comment : item) || "";
                        txt = txt.toString().trim();
                        
                        if (txt.length <= 5) return `<tr><td class="num-col">${i+1}</td><td><span style="color:#cbd5e1">---</span></td></tr>`;
                        
                        // FIX: Mas sigurado nga bold formatting
                        let formatted = txt
                          .replace(/^(\d{2}-\d{2}-\d{2})/g, '<b class="bold-item">$1</b>')
                          .replace(/"([^"]+)"/g, '<span class="quote">"$1"</span>')
                          .replace(/\n/g, '<br>');

                        return `<tr><td class="num-col">${i+1}</td><td>${formatted}</td></tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>`;
    }

    function closeModal() { document.getElementById('passwordModal').style.display = 'none'; }
    document.getElementById('btnGo').onclick = () => {
      if(document.getElementById('pwInput').value.trim() === activeAgent.password.toString()) {
          document.getElementById('scoreVal').style.display = 'block';
          document.getElementById('btnReveal').style.display = 'none';
          closeModal();
      } else { alert('❌ Incorrect password.'); }
    };
  </script>
</body>
</html>
