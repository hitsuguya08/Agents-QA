<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agent QA Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://googleapis.com');

    :root {
      --bg-dark: #f5fef5;
      --bg-panel: #e0f7e9;
      --accent: #2e7d32;
      --accent-light: #a5d6a7;
      --text-main: #1b5e20;
      --text-muted: #4caf50;
      --border: #c8e6c9;
      --quote-color: #388e3c;
    }

    body {
      font-family: 'Comic Neue', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 24px 0;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 24px;
      color: var(--accent);
      text-align: center;
    }

    .tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .tab-bar button {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .tab-bar button:hover {
      background: var(--accent-light);
    }

    .tab-bar button.active {
      background: var(--bg-panel);
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .agent-card {
      background: var(--bg-panel);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(46, 125, 50, 0.2);
      transition: transform 0.2s ease;
    }

    .agent-card h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .meta {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .reveal-btn {
      background: #a5d6a7;
      border: 2px solid #2e7d32;
      color: #1b5e20;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
      margin-bottom: 12px;
    }

    .reveal-btn:hover {
      background: #81c784;
    }

    details {
      background: #dcedc8;
      border: 2px solid var(--accent);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    summary {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--accent-light);
      font-weight: bold;
      background: #c5e1a5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      background: var(--accent);
      color: var(--bg-dark);
      text-align: left;
    }

    td {
      background: var(--bg-panel);
      color: var(--text-main);
    }

    tr:nth-child(even) td {
      background: #d0f0d0;
    }

    .quote {
      color: var(--quote-color);
      font-weight: bold;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .modal-content button {
      margin: 0 8px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .confirm-btn { background: #4caf50; color: white; }
    .cancel-btn { background: #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent QA Viewer</h1>
    <div id="tabs" class="tab-bar"></div>
    <div id="leaderboard" style="margin-bottom: 24px;"></div>
    <div id="output" class="card-container"></div>
  </div>

  <!-- Password Modal -->
  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3>Enter Password</h3>
      <input type="password" id="passwordInput" placeholder="Password" />
      <div>
        <button class="confirm-btn" id="confirmPassword">Confirm</button>
        <button class="cancel-btn" id="cancelPassword">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let currentAgent = null;
    let currentScoreSpan = null;
    let currentButton = null;

    // AUTOMATIC FETCH FROM data.json
    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json')
        .then(response => {
          if (!response.ok) throw new Error('File data.json not found');
          return response.json();
        })
        .then(data => {
          renderTabs(data);
        })
        .catch(err => {
          console.error(err);
          document.getElementById('output').innerHTML = 
            '<div class="error">⚠️ Error loading data. Please check if data.json exists in the same folder.</div>';
        });
    });

    function renderTabs(agents) {
      const tabsContainer = document.getElementById('tabs');
      const leaderboardContainer = document.getElementById('leaderboard');
      tabsContainer.innerHTML = '';
      
      const sortedAgents = [...agents].sort((a, b) => parseFloat(b.score) - parseFloat(a.score));

      // Leaderboard
      const topAgents = sortedAgents.filter(agent => parseFloat(agent.score) >= 90);
      if (topAgents.length > 0) {
        const list = topAgents.map(agent =>
          `<li><strong>${agent.name || 'Unnamed'}</strong> — ${agent.score}</li>`
        ).join('');
        leaderboardContainer.innerHTML = `
          <div style="background:#c8e6c9;border:2px solid #2e7d32;border-radius:12px;padding:16px;">
            <h2 style="color:#2e7d32;margin-top:0;">🏆 Great Job!</h2>
            <ul style="margin:0;padding-left:20px;">${list}</ul>
          </div>`;
      }

      sortedAgents.forEach((agent, index) => {
        const tab = document.createElement('button');
        tab.textContent = agent.name || `Agent ${index + 1}`;
        tab.addEventListener('click', () => {
          renderAgentCards([agent]);
          highlightTab(tabsContainer, tab);
        });
        tabsContainer.appendChild(tab);
      });

      if (sortedAgents.length > 0) tabsContainer.firstChild.click();
    }

    function highlightTab(container, activeTab) {
      [...container.children].forEach(tab => tab.classList.remove('active'));
      activeTab.classList.add('active');
    }

    function renderAgentCards(agentList) {
      const container = document.getElementById('output');
      container.innerHTML = '';

      agentList.forEach(agent => {
        const card = document.createElement('div');
        card.className = 'agent-card';
        card.innerHTML = `
          <h2>${agent.name || 'Unnamed Agent'}</h2>
          <div class="meta">ID: ${agent.id || 'N/A'} | QA: ${agent.qa ? agent.qa.length : 0} | Audits: ${agent.audits ? agent.audits.length : 0}</div>
          <div>
            <button class="reveal-btn">🔐 View QA Score</button>
            <span class="qa-score" style="display:none;margin-left:10px;font-weight:bold;"></span>
          </div>`;

        const btn = card.querySelector('.reveal-btn');
        const span = card.querySelector('.qa-score');

        btn.addEventListener('click', () => {
          currentAgent = agent;
          currentScoreSpan = span;
          currentButton = btn;
          document.getElementById('passwordInput').value = '';
          document.getElementById('passwordModal').style.display = 'flex';
        });

        card.appendChild(renderCalls('Long Calls', agent.qa || []));
        card.appendChild(renderCalls('Dispo Audits', agent.audits || []));
        container.appendChild(card);
      });
    }

    function renderCalls(label, calls) {
      const details = document.createElement('details');
      details.open = true;
      details.innerHTML = `<summary>${label} (${calls.length})</summary>`;
      const table = document.createElement('table');
      table.innerHTML = `<thead><tr><th>#</th><th>Comment</th></tr></thead>`;
      const tbody = document.createElement('tbody');
      calls.forEach((call, i) => {
        let comment = (call.comment || '').replace(/(Date Posted\s*)(\d{4}-\d{2}-\d{2})(.*?)(?=Date Posted|$)/g, '$1$2$3<br>');
        comment = comment.replace(/"([^"]+)"/g, '<span class="quote">"$1"</span>');
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${comment}</td></tr>`;
      });
      table.appendChild(tbody);
      details.appendChild(table);
      return details;
    }

    document.getElementById('confirmPassword').addEventListener('click', () => {
      const input = document.getElementById('passwordInput').value.trim();
      if (input === (currentAgent.password || '').toString().trim()) {
        currentScoreSpan.textContent = `QA Score: ${currentAgent.score || 'N/A'}`;
        currentScoreSpan.style.display = 'inline';
        currentButton.style.display = 'none';
        document.getElementById('passwordModal').style.display = 'none';
      } else { alert('❌ Incorrect password.'); }
    });

    document.getElementById('cancelPassword').addEventListener('click', () => {
      document.getElementById('passwordModal').style.display = 'none';
    });
  </script>
</body>
</html>
